name: Testes do internet banking

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes pytest
        run: python -m pytest -v --junit-xml=report.xml

      - name: Iniciar API Flask
        run: |
          nohup python -c "from app import app; app.run(host='127.0.0.1', port=5000, debug=False, use_reloader=False)" > api.log 2>&1 &
          sleep 5

            - name: Rodar Schemathesis
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          st run openapi.yaml --url http://127.0.0.1:5000 --max-examples 100 2>&1 | tee schemathesis_output.txt
      - name: Gerar matriz de rastreabilidade
        if: always()
        run: python scripts/gera_matriz.py > matriz_rastreabilidade.md

       - name: Publicar evidencias
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencia-sprint-8
          path: |
            report.xml
            matriz_rastreabilidade.md
            schemathesis_output.txt
            api.log